<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Players — ATON Gaming</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #090909;
      --bg-card: #111111;
      --bg-hover: #161616;
      --border: #1e1e1e;
      --border-accent: #2a2a2a;
      --text-primary: #f0f0f0;
      --text-secondary: #666;
      --text-muted: #333;
      --accent: #e63946;
      --accent-dim: rgba(230, 57, 70, 0.10);
    }

    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-primary); }

    /* HEADER */
    header {
      background: var(--bg);
      padding: 28px 40px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }

    header img { height: 64px; object-fit: contain; }
    .header-title-row { display: flex; align-items: center; gap: 16px; }
    .header-divider { width: 1px; height: 28px; background: var(--border-accent); }

    header h1 {
      font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 28px;
      letter-spacing: 6px; color: var(--text-primary); margin: 0;
    }

    .header-sub {
      font-size: 10px; font-family: 'Share Tech Mono', monospace;
      color: var(--text-muted); letter-spacing: 3px; text-transform: uppercase;
    }

    .page-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border: 1px solid var(--accent);
      background: var(--accent-dim); color: var(--accent);
      font-size: 9px; font-family: 'Share Tech Mono', monospace;
      letter-spacing: 2px; text-transform: uppercase; border-radius: 2px;
    }

    .page-badge::before {
      content: ''; display: inline-block; width: 5px; height: 5px;
      background: var(--accent); border-radius: 50%;
    }

    /* NAV */
    nav {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      gap: 2px; padding: 0 24px;
      position: sticky; top: 0; z-index: 50;
    }

    .nav-link {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 13px 18px;
      font-size: 10px; font-family: 'Share Tech Mono', monospace;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-muted); text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .nav-link:hover { color: var(--text-secondary); }
    .nav-link.active { color: var(--text-primary); border-bottom-color: var(--accent); }

    .nav-dot {
      width: 5px; height: 5px; border-radius: 1px;
      background: currentColor; opacity: 0.5; flex-shrink: 0;
    }

    .nav-link.active .nav-dot { opacity: 1; background: var(--accent); }
    .nav-sep { width: 1px; height: 16px; background: var(--border); margin: 0 4px; }

    /* CONTAINER */
    .container { max-width: 1200px; margin: auto; padding: 40px 24px 60px; }

    .section-intro { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .section-intro-line { flex: 1; height: 1px; background: var(--border); }
    .section-intro-label {
      font-size: 9px; font-family: 'Share Tech Mono', monospace;
      color: var(--text-muted); letter-spacing: 2.5px; text-transform: uppercase; white-space: nowrap;
    }

    /* SEARCH */
    .search-container { margin-bottom: 24px; }
    .search-box {
      width: 100%; padding: 14px 16px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 2px; color: var(--text-primary);
      font-size: 11px; font-family: 'Share Tech Mono', monospace;
      letter-spacing: 1px; transition: border-color 0.2s;
    }
    .search-box:focus { outline: none; border-color: var(--border-accent); }
    .search-box::placeholder { color: var(--text-muted); }

    /* PLAYERS GRID - Ajustado para melhor espaçamento */
    .players-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .player-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 3px; padding: 15px;
      transition: all 0.2s; position: relative; overflow: hidden;
      cursor: pointer;
    }

    .player-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--accent); opacity: 0; transition: opacity 0.2s;
    }

    .player-card:hover { border-color: var(--border-accent); transform: translateY(-2px); }
    .player-card:hover::before { opacity: 1; }

    /* CORREÇÃO DAS FOTOS AQUI */
    .player-photo {
      width: 100%; 
      height: 300px; /* Aumentado para mostrar mais do corpo/busto */
      background: var(--bg-hover); border: 1px solid var(--border);
      border-radius: 2px; margin-bottom: 14px;
      overflow: hidden; position: relative;
    }

    .player-photo img {
      width: 100%; height: 100%; 
      object-fit: cover; /* Mantém a proporção preenchendo o espaço */
      object-position: top center; /* Foca no topo (rosto) para evitar cortes na cabeça */
      transition: transform 0.4s ease;
    }

    .player-card:hover .player-photo img {
      transform: scale(1.08);
    }

    .player-photo-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; background: var(--bg-hover);
    }

    .player-name {
      font-family: 'Rajdhani', sans-serif; font-weight: 600;
      font-size: 16px; letter-spacing: 2px; color: var(--text-primary);
      text-transform: uppercase; margin-bottom: 4px;
    }

    .player-role {
      font-size: 9px; font-family: 'Share Tech Mono', monospace;
      letter-spacing: 1.5px; color: var(--text-muted);
      text-transform: uppercase; margin-bottom: 10px;
    }

    .player-status {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 8px; font-family: 'Share Tech Mono', monospace;
      letter-spacing: 1px; color: var(--accent); text-transform: uppercase;
    }

    .player-status::before {
      content: ''; width: 4px; height: 4px;
      background: var(--accent); border-radius: 50%;
    }

    /* MODAL */
    #modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.96); align-items: center;
      justify-content: center; z-index: 999;
    }

    .modal-content {
      max-width: 520px; width: 90%;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 3px; position: relative; overflow: hidden;
      animation: modalSlide 0.25s ease;
    }

    @keyframes modalSlide {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-header {
      padding: 24px 24px 20px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .modal-header h2 {
      font-family: 'Rajdhani', sans-serif; font-weight: 600;
      font-size: 18px; letter-spacing: 3px; color: var(--text-primary);
      text-transform: uppercase; margin-bottom: 6px;
    }

    .modal-subtitle {
      font-size: 9px; font-family: 'Share Tech Mono', monospace;
      letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase;
    }

    #close {
      position: absolute; top: 20px; right: 20px;
      width: 28px; height: 28px; background: var(--bg-hover);
      border: 1px solid var(--border); color: var(--text-secondary);
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: 16px;
      font-family: 'Share Tech Mono', monospace;
      transition: all 0.15s;
    }

    #close:hover { color: var(--accent); border-color: var(--accent); }

    .modal-body { padding: 20px 24px 24px; }

    .link-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px; background: var(--bg-hover);
      border: 1px solid var(--border); border-radius: 2px;
      margin-bottom: 10px; text-decoration: none;
      color: var(--text-primary); transition: all 0.2s;
      position: relative; overflow: hidden;
    }

    .link-item::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 2px; background: var(--accent); opacity: 0; transition: opacity 0.2s;
    }

    .link-item:hover { border-color: var(--border-accent); }
    .link-item:hover::before { opacity: 1; }

    .link-icon {
      width: 40px; height: 40px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 2px; display: flex; align-items: center;
      justify-content: center; font-size: 20px; flex-shrink: 0;
    }

    .link-info { flex: 1; }

    .link-title {
      font-family: 'Rajdhani', sans-serif; font-weight: 600;
      font-size: 13px; letter-spacing: 1.5px; color: var(--text-primary);
      text-transform: uppercase; margin-bottom: 3px;
    }

    .link-description {
      font-size: 9px; font-family: 'Share Tech Mono', monospace;
      letter-spacing: 1px; color: var(--text-muted);
    }

    /* FOOTER */
    footer {
      text-align: center; padding: 20px; border-top: 1px solid var(--border);
      margin-top: 20px; color: var(--text-muted); font-size: 10px;
      font-family: 'Share Tech Mono', monospace; letter-spacing: 2px;
      text-transform: uppercase;
    }

    @media (max-width: 600px) {
      header { padding: 20px 16px; }
      header h1 { font-size: 20px; letter-spacing: 4px; }
      .container { padding: 24px 12px 40px; }
      .players-grid { grid-template-columns: 1fr; }
      .player-photo { height: 350px; } /* Foto maior no mobile */
      nav { justify-content: flex-start; overflow-x: auto; }
      nav::-webkit-scrollbar { display: none; }
    }
  </style>
</head>
<body>

<header>
  <img src="imgs/aton.png" alt="Aton Gaming">
  <div class="header-title-row">
    <div class="header-divider"></div>
    <div>
      <h1>DEMOS</h1>
      <div class="header-sub">TEAM // Membros</div>
    </div>
    <div class="header-divider"></div>
  </div>
  <span class="page-badge">Dashboard de Players</span>
</header>

<nav>
  <a href="inicio.html" class="nav-link"><span class="nav-dot"></span>Início</a>
  <div class="nav-sep"></div>
  <a href="agenda.html" class="nav-link"><span class="nav-dot"></span>Agenda</a>
  <div class="nav-sep"></div>
  <a href="main.html" class="nav-link"><span class="nav-dot"></span>Mapas</a>
  <div class="nav-sep"></div>
  <a href="demos.html" class="nav-link active"><span class="nav-dot"></span>Demos</a>
</nav>

<div class="container">

  <div class="section-intro">
    <div class="section-intro-line"></div>
    <div class="section-intro-label">Membros da Equipe</div>
    <div class="section-intro-line"></div>
  </div>

  <div class="search-container">
    <input type="text" class="search-box" id="searchBox" placeholder="BUSCAR PLAYER...">
  </div>

  <div class="players-grid" id="playersGrid">
    </div>

</div>

<footer>ATON Gaming // Players Dashboard</footer>

<div id="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalPlayerName"></h2>
      <div class="modal-subtitle" id="modalPlayerRole"></div>
      <span id="close">&times;</span>
    </div>
    <div class="modal-body" id="modalLinks">
      </div>
  </div>
</div>

<script>

  const players = [

        { title: "Demo 3", description: "Demo", icon: "🎮", url: "https://www.youtube.com/watch?v=tbIC8G5_D0g" },
        { title: "Demo 4", description: "Demo", icon: "🎮", url: "https://www.youtube.com/watch?v=1UJwyadqp20" }
      ]
    },
    {
      name: "Rfz",
      photo: "imgs/players/RFZ.png",
      icon: "🎨",
      role: "Rifler // Entry-fragger",
      status: "Ativo",
      links: [
        { title: "Demo 1", description: "Demo", icon: "🎮", url: "https://www.youtube.com/watch?v=QqzaZ31NiB0&t" },
        { title: "Demo 2", description: "Demo", icon: "🎮", url: "https://www.youtube.com/watch?v=sZBzpFwhBNY" },
        { title: "Demo 3", description: "Demo", icon: "🎮", url: "https://www.youtube.com/watch?v=xHKNvwEqNU8" },
        { title: "Demo 4", description: "Demo", icon: "🎮", url: "https://www.youtube.com/watch?v=3ts7JC_dY8s" }
      ]
    },
    {
      name: "Estrela",
      photo: "imgs/players/ESTRELA.png",
      icon: "⚡",
      role: "AWPer // IGL",
      status: "Ativo",
      links: [
        { title: "Demo 1", description: "Demo", icon: "🎮", url: "https://www.youtube.com/watch?v=AcPjGx3AKL8" },
        { title: "Demo 2", description: "Demo", icon: "🎮", url: "https://www.youtube.com/watch?v=80p-poykQDQ" },
        { title: "Demo 3", description: "Demo", icon: "🎮", url: "https://www.youtube.com/watch?v=FtPPmlRuhdA" },
        { title: "Demo 4", description: "Demo", icon: "🎮", url: "https://www.youtube.com/watch?v=80p-poykQDQ" }
      ]
    },
    {
      name: "Wit1",
      photo: "imgs/players/WIT.png",
      icon: "🔥",
      role: "Rifler // Lurker",
      status: "Ativo",
      links: [
        { title: "Demo 1", description: "Demo", icon: "🎮", url: "https://www.youtube.com/watch?v=QqzaZ31NiB0&t=5s" },
        { title: "Demo 2", description: "Demo", icon: "🎮", url: "https://www.youtube.com/watch?v=sZBzpFwhBNY" },
        { title: "Demo 3", description: "Demo", icon: "🎮", url: "https://www.youtube.com/watch?v=EfF0dr5j8A0" },
        { title: "Demo 4", description: "Demo", icon: "🎮", url: "https://www.youtube.com/watch?v=3ts7JC_dY8s" }
      ]
    },
    {
      name: "Vita1",
      photo: "imgs/players/VITA1.png",
      icon: "💎",
      role: "Rifler // Support",
      status: "Ativo",
      links: [
        { title: "Demo 1", description: "Demo", icon: "🎮", url: "https://www.youtube.com/watch?v=c8d0ulLY5hw" },
        { title: "Demo 2", description: "Demo", icon: "🎮", url: "https://www.youtube.com/watch?v=sZBzpFwhBNY" },
        { title: "Demo 3", description: "Demo", icon: "🎮", url: "https://www.youtube.com/watch?v=ZXwb7NVJJiU" },
        { title: "Demo 4", description: "Demo", icon: "🎮", url: "https://www.youtube.com/watch?v=oyzDaerjRQA" }
      ]
    }
  ];

  // Renderizar players
  function renderPlayers(filteredPlayers = players) {
    const grid = document.getElementById('playersGrid');
    grid.innerHTML = '';

    filteredPlayers.forEach((player, index) => {
      const card = document.createElement('div');
      card.className = 'player-card';
      card.onclick = () => openModal(index);
      
      const photoHTML = player.photo 
        ? `<div class="player-photo"><img src="${player.photo}" alt="${player.name}"></div>`
        : `<div class="player-photo"><div class="player-photo-placeholder">${player.icon}</div></div>`;
      
      card.innerHTML = `
        ${photoHTML}
        <div class="player-name">${player.name}</div>
        <div class="player-role">${player.role}</div>
        <div class="player-status">${player.status}</div>
      `;
      
      grid.appendChild(card);
    });
  }

  // Abrir modal
  function openModal(playerIndex) {
    const player = players[playerIndex];
    const modal = document.getElementById('modal');
    const modalPlayerName = document.getElementById('modalPlayerName');
    const modalPlayerRole = document.getElementById('modalPlayerRole');
    const modalLinks = document.getElementById('modalLinks');

    modalPlayerName.textContent = player.name;
    modalPlayerRole.textContent = player.role;
    
    modalLinks.innerHTML = '';
    player.links.forEach(link => {
      const linkElement = document.createElement('a');
      linkElement.className = 'link-item';
      linkElement.href = link.url;
      linkElement.target = '_blank';
      
      linkElement.innerHTML = `
        <div class="link-icon">${link.icon}</div>
        <div class="link-info">
          <div class="link-title">${link.title}</div>
          <div class="link-description">${link.description}</div>
        </div>
      `;
      
      modalLinks.appendChild(linkElement);
    });

    modal.style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('modal').style.display = 'none';
  }

  document.getElementById('close').onclick = (e) => {
    e.stopPropagation();
    closeModal();
  };

  document.getElementById('modal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modal')) closeModal();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  document.getElementById('searchBox').addEventListener('input', function(e) {
    const searchTerm = e.target.value.toLowerCase();
    const filteredPlayers = players.filter(player => 
      player.name.toLowerCase().includes(searchTerm) ||
      player.role.toLowerCase().includes(searchTerm)
    );
    renderPlayers(filteredPlayers);
  });

  renderPlayers();
</script>

</body>
</html>
