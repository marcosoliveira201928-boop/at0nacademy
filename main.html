<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapas - Táticas</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #e2e8f0;
    }

  header {
      background: #1a1a1a;
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #2a2a2a;
    }

    header img {
      height: 80px;
      margin-bottom: 10px;
    }

    header h1 {
      margin: 0;
      color: #ffffff;
      font-size: 24px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .maps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .map-card {
      background: transparent;
      border: none;
      border-radius: 0;
      overflow: hidden;
      text-align: center;
      transition: 0.3s;
      cursor: pointer;
    }

    .map-card:hover {
      transform: scale(1.05);
    }

    .map-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .map-card h2 {
      display: none;
    }

    .map-card a {
      text-decoration: none;
      color: inherit;
      display: block;
      padding-bottom: 10px;
    }

    footer {
      text-align: center;
      padding: 15px;
      border-top: 1px solid #1e293b;
      margin-top: 30px;
    }
  </style>
</head>
<body>

<header>
  <img src="imgs/aton.png" alt="Aton Academy">
  <h1>ESCOLHA O MAPA</h1>
</header>

<div class="container">

  <div class="maps">

    <!-- DUST2 -->
    <div class="map-card">
      <a href="ancient.html">
        <img src="./imgs/ancient.jpg" alt="Dust2">
        <h2>Dust2</h2>
      </a>
    </div>

    <!-- MIRAGE -->
    <div class="map-card">
      <a href="mirage.html">
        <img src="./imgs/mirage.jpg" alt="Mirage">
        <h2>Mirage</h2>
      </a>
    </div>

  </div>

</div>

<footer>
  Selecione um mapa para ver as táticas
</footer>

</body>
</html>
