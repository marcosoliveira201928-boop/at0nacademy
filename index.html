<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AT0N Gaming — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #090909;
      --bg-card: #111111;
      --bg-hover: #161616;
      --border: #1e1e1e;
      --border-accent: #2a2a2a;
      --text-primary: #f0f0f0;
      --text-secondary: #666;
      --text-muted: #333;
      --accent: #e63946;
      --accent-dim: rgba(230, 57, 70, 0.10);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: url('https://media.discordapp.net/attachments/1482819377106522144/1490112448538214581/Gemini_Generated_Image_uodijjuodijjuodi.png?ex=69d4305c&is=69d2dedc&hm=33dbf07cdfee6650204bb55b6ab82bb48af49346114201e15f5a79fc7c6c1162&=&format=webp&quality=lossless') no-repeat center center;
      background-size: cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 24px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(9, 9, 9, 0.72);
      z-index: 0;
    }

    /* LOGO */
    .logo {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      width: 160px;
      object-fit: contain;
    }

    .logo-label {
      font-size: 9px;
      font-family: 'Share Tech Mono', monospace;
      color: var(--text-muted);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* BOX */
    .box {
      position: relative;
      z-index: 1;
      background: rgba(11, 11, 11, 0.96);
      border: 1px solid var(--border-accent);
      border-radius: 3px;
      width: 320px;
      padding: 32px 28px 28px;
      backdrop-filter: blur(12px);
    }

    .box-header {
      margin-bottom: 24px;
      text-align: center;
    }

    .box-title {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 20px;
      letter-spacing: 4px;
      color: var(--text-primary);
      text-transform: uppercase;
    }

    .box-sub {
      font-size: 9px;
      font-family: 'Share Tech Mono', monospace;
      color: var(--text-muted);
      letter-spacing: 2px;
      margin-top: 4px;
    }

    /* FORM */
    .field {
      margin-bottom: 12px;
    }

    .field-label {
      display: block;
      font-size: 9px;
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: 2px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border-accent);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      border-radius: 2px;
      outline: none;
      transition: border-color 0.15s;
    }

    input::placeholder { color: var(--text-muted); }
    input:focus { border-color: var(--text-secondary); }
    input.error { border-color: var(--accent); }
    input.success { border-color: #2dc653; }

    button {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      border: none;
      color: white;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 3px;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.15s, transform 0.1s;
      margin-top: 8px;
      text-transform: uppercase;
    }

    button:hover { background: #c1121f; }
    button:active { transform: scale(0.98); }

    button.loading {
      background: var(--border-accent);
      color: var(--text-secondary);
      cursor: not-allowed;
      pointer-events: none;
    }

    .erro {
      display: none;
      margin-top: 12px;
      padding: 8px 10px;
      background: rgba(230, 57, 70, 0.08);
      border: 1px solid rgba(230, 57, 70, 0.25);
      border-radius: 2px;
      color: var(--accent);
      font-size: 11px;
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: 0.5px;
      text-align: center;
    }

    /* SHAKE */
    .shake { animation: shake 0.3s; }

    @keyframes shake {
      0%   { transform: translateX(0); }
      25%  { transform: translateX(-6px); }
      50%  { transform: translateX(6px); }
      75%  { transform: translateX(-6px); }
      100% { transform: translateX(0); }
    }

    /* FOOTER */
    .login-footer {
      position: relative;
      z-index: 1;
      font-size: 9px;
      font-family: 'Share Tech Mono', monospace;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    @media (max-width: 400px) {
      .box { width: 90vw; padding: 24px 18px; }
    }
  </style>
</head>
<body>

  <div class="logo">
    <img src="imgs/aton.png" alt="AT0N Gaming">
    <span class="logo-label">CS2 // Táticas</span>
  </div>

  <div class="box" id="box">
    <div class="box-header">
      <div class="box-title">Login</div>
      <div class="box-sub">Acesso restrito</div>
    </div>

    <form id="loginForm">
      <div class="field">
        <label class="field-label" for="user">Usuário</label>
        <input type="text" id="user" placeholder="seu usuário" required autocomplete="off">
      </div>

      <div class="field">
        <label class="field-label" for="pass">Senha</label>
        <input type="password" id="pass" placeholder="••••••••" required>
      </div>

      <button type="submit" id="btn">Entrar</button>

      <div class="erro" id="erro">Usuário ou senha incorretos</div>
    </form>
  </div>

  <span class="login-footer">At0n Gaming — 2026</span>

<script>
  const form = document.getElementById("loginForm");
  const user = document.getElementById("user");
  const pass = document.getElementById("pass");
  const erro = document.getElementById("erro");
  const box  = document.getElementById("box");
  const btn  = document.getElementById("btn");

  const users = [
    { username: "atongaming", password: "atongaming2026" },
  ];

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    erro.style.display = "none";
    user.classList.remove("error", "success");
    pass.classList.remove("error", "success");

    const validUser = users.find(u =>
      u.username === user.value && u.password === pass.value
    );

    if (validUser) {
      user.classList.add("success");
      pass.classList.add("success");
      btn.classList.add("loading");
      btn.innerText = "Entrando...";
      setTimeout(() => { window.location.href = "inicio.html"; }, 1200);
    } else {
      erro.style.display = "block";
      user.classList.add("error");
      pass.classList.add("error");
      box.classList.add("shake");
      setTimeout(() => box.classList.remove("shake"), 300);
    }
  });
</script>

</body>
</html>
